name: Docs

on:
  push:
    branches: [main]
  # Allows deploying the current main manually from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read

# Let an in-progress deploy finish, but drop any queued runs in favour of the
# newest commit — we only ever want the latest docs live.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # The docs app resolves `ngx-signal-query` from dist/, so the library
      # has to be built first.
      - name: Build library
        run: pnpm build:lib

      - name: Build docs
        run: pnpm docs:build:gh

      # GitHub Pages has no SPA fallback: serving 404.html as a copy of
      # index.html lets deep links like /introduction survive a hard refresh.
      - name: Add SPA fallback
        run: cp dist/docs/browser/index.html dist/docs/browser/404.html

      # Stop GitHub Pages from running the output through Jekyll.
      - name: Disable Jekyll
        run: touch dist/docs/browser/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/docs/browser

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
